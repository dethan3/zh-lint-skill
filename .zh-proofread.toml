# 中文校对 Skill 配置文件

# 排除的路径模式
[exclude]
paths = [
    "node_modules",
    "__pycache__",
    ".git",
    ".venv",
    "venv",
    "vendor",
    "dist",
    "build",
    ".tox",
    ".mypy_cache",
    "*.min.js",
    "*.min.css",
]

# 白名单：这些术语不会被标记为错误
[whitelist]
terms = [
    # 技术术语
    "正则表达式",
    "哈希表",
    "链表",
    "二叉树",
    "递归",
    "迭代",
    "异步",
    "并发",
    "协程",
    "闭包",
    "柯里化",
    "多态",
    "封装",
    "继承",

    # 常见缩写
    "yyds",
    "绝绝子",
    "awsl",
    "xswl",

    # 专有名词（示例）
    "图灵",
    "冯·诺依曼",
    "高德纳",
]
